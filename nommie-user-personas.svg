<svg viewBox="0 0 800 672" width="800" height="672" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two hand-drawn user personas for nommie: Maya the Sharer and Daniel the Keeper">
<title>Two cooks, one table</title>
<desc>Two illustrated persona cards for nommie. Maya, 23, a food creator who grows the network through shareable cards. Daniel, 38, a meal-prepping dad who keeps the network alive through his personal collection and macros. Each lists their current habits, goals, frustrations, and the nommie features that fit.</desc>

<defs>
<clipPath id="mayaClip"><circle cx="88" cy="170" r="44"/></clipPath>
<clipPath id="danClip"><circle cx="464" cy="170" r="44"/></clipPath>
