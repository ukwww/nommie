<text x="148" y="150" font-family="Lora, Georgia, serif" font-size="19" font-weight="bold" fill="#4A3728">Maya</text>
<text x="148" y="169" font-family="Nunito, Helvetica, sans-serif" font-size="11" fill="#4A3728" fill-opacity="0.6">23 &#183; grad student &amp; creator</text>
<rect x="148" y="180" width="128" height="21" rx="10.5" fill="#B5677A" fill-opacity="0.16"/>
<text x="212" y="194.5" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#8A3F52" text-anchor="middle">The Sharer &#183; grows it</text>

<text x="524" y="150" font-family="Lora, Georgia, serif" font-size="19" font-weight="bold" fill="#4A3728">Daniel</text>
<text x="524" y="169" font-family="Nunito, Helvetica, sans-serif" font-size="11" fill="#4A3728" fill-opacity="0.6">38 &#183; product manager &amp; dad</text>
<rect x="524" y="180" width="126" height="21" rx="10.5" fill="#3A5C44" fill-opacity="0.16"/>
<text x="587" y="194.5" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#2A4331" text-anchor="middle">The Keeper &#183; keeps it</text>

<text x="48" y="242" font-family="Lora, Georgia, serif" font-style="italic" font-size="13" fill="#8A3F52">&#8220;My cooking should look as good as it</text>
<text x="48" y="260" font-family="Lora, Georgia, serif" font-style="italic" font-size="13" fill="#8A3F52">tastes. I want credit when it travels.&#8221;</text>

<text x="424" y="242" font-family="Lora, Georgia, serif" font-style="italic" font-size="13" fill="#2A4331">&#8220;I just want my wins in one place, and</text>
<text x="424" y="260" font-family="Lora, Georgia, serif" font-style="italic" font-size="13" fill="#2A4331">the macros without the guilt trip.&#8221;</text>

<line x1="48" y1="280" x2="376" y2="280" stroke="#B5677A" stroke-opacity="0.25"/>
<line x1="424" y1="280" x2="752" y2="280" stroke="#3A5C44" stroke-opacity="0.25"/>

<text x="48" y="306" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#B5677A" letter-spacing="0.4">In the kitchen now</text>
<text x="48" y="324" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">Cooks in a tiny apartment, posts plates to</text>
<text x="48" y="340" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">IG stories, screenshots recipes she loses.</text>

<text x="48" y="370" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#B5677A" letter-spacing="0.4">What she wants</text>
<text x="48" y="388" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">An audience, a signature look, and credit</text>
<text x="48" y="404" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">when other people cook her dishes.</text>

<text x="48" y="434" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#B5677A" letter-spacing="0.4">What frustrates her</text>
<text x="48" y="452" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">Reposts strip her name; her Instagram</text>
<text x="48" y="468" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">saves are an unsearchable graveyard.</text>

<text x="48" y="498" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#B5677A" letter-spacing="0.4">Why nommie fits</text>
<rect x="48" y="508" width="86" height="22" rx="11" fill="#FFFFFF" stroke="#B5677A" stroke-opacity="0.4"/>
<text x="91" y="523" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">Export cards</text>
<rect x="140" y="508" width="94" height="22" rx="11" fill="#FFFFFF" stroke="#B5677A" stroke-opacity="0.4"/>
<text x="187" y="523" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">Replate credit</text>
<rect x="48" y="536" width="76" height="22" rx="11" fill="#FFFFFF" stroke="#B5677A" stroke-opacity="0.4"/>
<text x="86" y="551" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">Followers</text>
<rect x="130" y="536" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#B5677A" stroke-opacity="0.4"/>
<text x="165" y="551" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">Palettes</text>

<text x="424" y="306" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#3A5C44" letter-spacing="0.4">In the kitchen now</text>
<text x="424" y="324" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">Meal preps on Sundays, juggling Apple</text>
<text x="424" y="340" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">Notes and a joyless macro tracker.</text>

<text x="424" y="370" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#3A5C44" letter-spacing="0.4">What he wants</text>
<text x="424" y="388" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">A reliable personal cookbook and honest</text>
<text x="424" y="404" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">numbers, so he can cook the hits again.</text>

<text x="424" y="434" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#3A5C44" letter-spacing="0.4">What frustrates him</text>
<text x="424" y="452" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">Recipes scattered across notes and</text>
<text x="424" y="468" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.8">screenshots; macro apps feel clinical.</text>

<text x="424" y="498" font-family="Nunito, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#3A5C44" letter-spacing="0.4">Why nommie fits</text>
<rect x="424" y="508" width="102" height="22" rx="11" fill="#FFFFFF" stroke="#3A5C44" stroke-opacity="0.4"/>
<text x="475" y="523" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">Macro estimates</text>
<rect x="532" y="508" width="78" height="22" rx="11" fill="#FFFFFF" stroke="#3A5C44" stroke-opacity="0.4"/>
<text x="571" y="523" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">Steps-first</text>
<rect x="424" y="536" width="76" height="22" rx="11" fill="#FFFFFF" stroke="#3A5C44" stroke-opacity="0.4"/>
<text x="462" y="551" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">Collection</text>
<rect x="506" y="536" width="90" height="22" rx="11" fill="#FFFFFF" stroke="#3A5C44" stroke-opacity="0.4"/>
<text x="551" y="551" font-family="Nunito, Helvetica, sans-serif" font-size="10.5" fill="#4A3728" text-anchor="middle">No algorithm</text>

<text x="400" y="600" font-family="Lora, Georgia, serif" font-style="italic" font-size="12.5" fill="#3A5C44" text-anchor="middle">One shares to grow the table. One keeps coming back to it. nommie is built for both.</text>

<text x="28" y="656" font-family="Nunito, Helvetica, sans-serif" font-size="11" fill="#4A3728" fill-opacity="0.45">User personas, July 2026 &#183; illustrative, drawn from target-user research</text>
</svg>
