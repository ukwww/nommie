<rect x="6" y="6" width="788" height="660" rx="24" fill="#F5F0E8"/>

<text x="28" y="52" font-family="Lora, Georgia, serif" font-style="italic" font-size="25" fill="#3A5C44">Two cooks, one table</text>
<text x="28" y="74" font-family="Nunito, Helvetica, sans-serif" font-size="11.5" fill="#4A3728" fill-opacity="0.6">Very different people, both core to nommie: one grows the network, the other keeps it alive.</text>

<rect x="28" y="96" width="368" height="540" rx="18" fill="#F6EAEA" stroke="#B5677A" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="7 5"/>
